name: PharmaSignal CI

# Runs the unit test suite on every push and PR.
#
# Production gold is built locally via `make backfill-local` after each quarterly
# FDA FAERS release (~Jan, Apr, Jul, Oct) and synced to S3 manually.
# CI cannot replicate that workflow (it would require downloading ~27 GB of FAERS
# ZIPs) and does not touch S3.
on:
  push:
    branches: ["main", "dev"]
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pip install pytest && PYTHONPATH=src pytest -q
